skill_id: resume-parsing
skill_name: 简历解析
version: "1.0.1"
description: 从PDF/DOCX简历提取的原始文本中，解析出结构化的候选人信息（姓名、联系方式、教育经历、工作经历、项目经历、技能标签）
author: recruitment-agent
tags:
  - resume
  - parsing
  - recruitment

input_schema:
  type: object
  properties:
    raw_text:
      type: string
      description: 从PDF/DOCX文件中提取的原始文本内容
    file_name:
      type: string
      description: 原始文件名（辅助推断姓名）
  required:
    - raw_text

output_schema:
  type: object
  properties:
    candidate_name:
      type: string
      description: 候选人姓名；如果无法从文本中明确提取，留空字符串""
    phone:
      type: string
      description: 手机号码；未找到则留空字符串""
    email:
      type: string
      description: 邮箱地址；未找到则留空字符串""
    summary:
      type: string
      description: 个人简介/自我评价（100字以内）；没有则留空字符串""
    education:
      type: array
      items:
        type: object
        properties:
          school:
            type: string
            description: 学校名称
          degree:
            type: string
            description: 学位/学历（如本科、硕士、博士、大专）
          major:
            type: string
            description: 专业
          start_date:
            type: string
            description: 开始时间（如2018-09）；不确定则留空""
          end_date:
            type: string
            description: 结束时间（如2022-06，"至今"表示在读）；不确定则留空""
        required:
          - school
      description: 教育经历列表（按时间倒序）；没有则返回空数组[]
    work_experience:
      type: array
      items:
        type: object
        properties:
          company:
            type: string
            description: 公司名称
          position:
            type: string
            description: 职位名称
          start_date:
            type: string
            description: 开始时间；不确定则留空""
          end_date:
            type: string
            description: 结束时间（"至今"表示在职）；不确定则留空""
          description:
            type: string
            description: 工作内容和职责（精简概括）
        required:
          - company
          - position
      description: 工作经历列表（按时间倒序）；没有则返回空数组[]
    project_experience:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: 项目名称
          role:
            type: string
            description: 担任角色；不确定则留空""
          start_date:
            type: string
            description: 开始时间；不确定则留空""
          end_date:
            type: string
            description: 结束时间；不确定则留空""
          description:
            type: string
            description: 项目描述和个人贡献（精简概括）
        required:
          - name
      description: 项目经历列表（按时间倒序，最多5个）；没有则返回空数组[]
    skills:
      type: array
      items:
        type: string
      description: 技能标签列表（提取3-10个核心技能，使用简洁的短语如Python、React、产品设计、项目管理）；如果没有明确技能则返回空数组[]
  required:
    - candidate_name
    - skills
    - education
    - work_experience
    - project_experience
    - phone
    - email
    - summary

max_retries: 0
